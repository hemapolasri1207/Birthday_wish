<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Hearts</title>
<style>
  body{
    margin:0;
    padding:0;
    animation: bgcolor infinite 20s;
    height:100vh;
    overflow:hidden;
}
/* background color change*/
h1{
    margin:0;
    padding:0;
    font-family: arial;
    font-size: 4em;
    color:#171515;
    position:absolute;
    top:50%;
    left: 50%;
    transform:translate(-50%,-50%);
    text-align: center;
}
@keyframes bgcolor{
    0%{
        background: rgb(255, 196, 0);
    }
     10%{
        background: rgb(133, 197, 6);
    } 
    20%{
        background: rgb(21, 255, 0);
    }
     40%{
        background: rgb(6, 144, 148);
    }
     50%{
        background: aqua;
    }
     60%{
        background: rgb(56, 79, 226);
    }
     100%{
        background: rgb(174, 0, 255);
    }
}
/* container */
.hearts{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
}

/* heart shape */
.heart{
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    transform:rotate(45deg);
    animation:float 3s linear infinite;
}

/* heart circles */
.heart::before,
.heart::after{
    content:'';
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    border-radius:50%;
}

.heart::before{
    top:-10px;
    left:0;
}

.heart::after{
    left:-10px;
    top:0;
}

/* animation */
@keyframes float{
    0%{
        transform:translateY(100vh) rotate(9deg);
        opacity:2;
    }
    100%{
        transform:translateY(-10vh) rotate(5deg);
        opacity:0;
    }
}
/* random positions */
.heart:nth-child(1){ left:10%; animation-duration:5s; }
.heart:nth-child(2){ left:30%; animation-duration:7s; }
.heart:nth-child(3){ left:50%; animation-duration:6s; }
.heart:nth-child(4){ left:70%; animation-duration:8s; }
.heart:nth-child(5){ left:90%; animation-duration:5.5s; }
.heart:nth-child(6){ left:60%; animation-duration:3.5s; }
.heart:nth-child(7){ left:20%; animation-duration:4.5s; }
.heart:nth-child(8){ left:80%; animation-duration:5.5s; }
.btn{
    position:absolute;
    font-size: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display:inline-block;
    text-align: center;
    font-weight: bold;
    padding:0.7em 2em;
    border:3px solid rgb(226, 226, 232);
    border-radius: 50%;
    box-shadow: #f4e258;
    color:rgb(243, 146, 162);
    text-decoration: none;
    transition: 0.3s ease all;
    z-index:1;
    top:75%;
    left:50%;
    transform: translate(-50%,-50%);
}
.btn:hover,.btn:focus{
    color:rgb(186, 86, 86);
}
.btn:hover:before,.btn:focus:before{
    transition:0.5s all ease;
    left:0;
    right: 0;
    opacity:1;
}
btn:active{
    transform:scale(0,9);
}
  * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .stage {
      width: 800px;
      height: 450px;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 2px solid #fff;
    }

    .photo {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scale(1.1);
      animation: fadeZoom 12s ease-in-out infinite;
    }

    .photo img {
      width: 110%;
      height: 110%;
      object-fit: cover;
      position: absolute;
    }

    .photo:nth-child(1) { animation-delay: 0s; }
    .photo:nth-child(2) { animation-delay: 4s; }
    .photo:nth-child(3) { animation-delay: 8s; }

    @keyframes fadeZoom {
      0% {
        opacity: 0;
        transform: scale(1.1) translate(0, 0);
      }
      10% {
        opacity: 1;
      }
      70% {
        opacity: 1;
        transform: scale(1.3) translate(-10px, -10px);
      }
      100% {
        opacity: 0;
        transform: scale(1.4) translate(-20px, -20px);
      }
    }
    /* 3D HEART FOR TITLE */
.heart3d{
    display:inline-block;
    width:30px;
    height:30px;
    margin-left:10px;
    position:relative;
    transform-style:preserve-3d;
    animation:heartRotate 4s linear infinite;
}

/* 3D rotation */
@keyframes heartRotate{
    0%{
        transform:rotate(-0deg) rotateY(0deg);
    }
    100%{
        transform:rotate(-0deg) rotateY(360deg);
    }
}
</style>
</head>

<body>
 <h1>
  HAPPY BIRTHDAY BHOO
  <center><span class="heart3d">❤️</span></center>
</h1>
<div class="hearts">
  <div class="heart"></div>
  <div class="heart"></div>
  <div class="heart"></div>
  <div class="heart"></div>
  <div class="heart"></div>
  <div class="heart"></div>
  <div class="heart"></div>
  <div class="heart"></div>
</div>
<button class="btn" onclick="goNext()">Surprise</button>

<script>
function goNext(){
    window.location.href = "page2.html";
}
</script>
</body>
</html>
