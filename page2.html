<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle, #ff4d6d, #7a0019);
  overflow:hidden;
}

/* START SCREEN */
.start-screen{
  text-align:center;
  color:white;
  cursor:pointer;
  transition:1s;
}

/* MAIN TITLE */
.start-screen h1{
  font-size:60px;
  font-weight:bold;
  text-shadow:0 0 20px rgba(255,255,255,0.8);
  animation: glow 2s infinite alternate;
}

/* SUB TEXT */
.start-screen p{
  margin-top:15px;
  font-size:22px;
  opacity:0.9;
}

/* GLOW ANIMATION */
@keyframes glow{
  from{
    text-shadow:0 0 10px #fff, 0 0 20px #ff99aa;
  }
  to{
    text-shadow:0 0 20px #fff, 0 0 40px #ff3366;
  }
}

</style>
</head>

<body>

<div class="start-screen" onclick="goNext()">
  <h1>💖 For You 💖</h1>
  <p>Tap to Start</p>
</div>

<script>
function goNext(){
    window.location.href = "page3.html"; // your next page name
}
</script>

</body>
</html>
